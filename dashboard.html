<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Electric Bill Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #E2BCBC;">
  <div class="phone">
    <h2 class="title">Dashboard</h2>
    <div class="logo">⚡</div>
    <h3 style="text-align:center;">Electric Bill Calculator</h3>
    <form>
      <div class="input-box"><input id="monthInput" type="text" placeholder="Month"></div>
      <div class="input-box"><input id="powerInput" type="number" placeholder="Power consumption (kWh)"></div>
      <div class="input-box"><input id="rateInput" type="number" placeholder="Cost per kWh"></div>
      <div class="button">
        <button type="button">Calculate</button>
      </div>
      <div class="input-box"><input id="resultBox" type="text" placeholder="Result" readonly></div>
      <div class="button" style="width:40%; background:#d23cff;">Save</div>
      <a href="menu.html" class="button">Menu</a>
    </form>
  </div>
</body>
</html>
