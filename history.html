<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing History - Electric Bill Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #E2BCBC;">
  <div class="phone">
    <div class="billing-container">
      <h2 class="title">Billing History</h2>
      <div class="consumer-details">
        <div class="detail">
          <span class="label">Month: </span>
          <span class="value">December</span>
        </div>
        <div class="detail">
          <span class="label">Customer Name: </span>
          <span class="value">Anna Tore</span>
        </div>
        <div class="detail">
          <span class="label">Power Consumption: </span>
          <span class="value">590 kWh</span>
        </div>
        <div class="detail">
          <span class="label">Cost per kWh: </span>
          <span class="value">₱150</span>
        </div>
        <div class="detail">
          <span class="label">Bill Amount: </span>
          <span class="value">₱88,500</span>
        </div>
      </div>
      <div class="total-amount">
        <span>Total Amount: </span>
        <span class="amount">₱88,500</span>
      </div>
      <a href="dashboard.html" class="button back-btn">Back</a>
    </div>
  </div>
</body>
</html>
