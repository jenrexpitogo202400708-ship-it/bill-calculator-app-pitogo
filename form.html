<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" type="text/css" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form - Electric Bill Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #E2BCBC;">
<div class="phone">
  <h2 class="title">Electric Bill Calculator</h2>
  <div class="logo">⚡</div>
  <form action="login.html">
    <div class="input-box"><input type="text" placeholder="Admin id"></div>
    <div class="input-box"><input type="text" placeholder="Name"></div>
    <div class="input-box"><input type="text" placeholder="Address"></div>
    <div class="input-box"><input type="number" placeholder="Contact number"></div>
    <div class="input-box"><input type="email" placeholder="Email"></div>
    <div class="input-box"><input type="password" placeholder="Password"></div>
    <div class="button">
      <button type="submit">Confirm</button>
    </div>
  </form>
</div>
</body>
</html>
